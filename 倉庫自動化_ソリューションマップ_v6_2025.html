<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>倉庫自動化 ソリューションマップ 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f2f4f8;
  --surface: #ffffff;
  --surface2: #f7f8fc;
  --border: #e2e6f0;
  --border2: #cdd3e3;
  --text: #1a1f36;
  --text2: #3d4461;
  --muted: #7c87a6;
  --muted2: #b0b8d0;
  --sb: #ff6600;
  --sb-light: rgba(255,102,0,0.07);

  /* Layer colors */
  --l-inbound:  #e8341a;
  --l-storage:  #1a6be8;
  --l-hconv:    #0e8f6e;
  --l-vconv:    #7c3aed;
  --l-pick:     #c4870a;
  --l-sort:     #0a7eb8;
  --l-outbound: #9b1fd4;
  --l-brain:    #1a1f36;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── TOPBAR ── */
.topbar {
  height: 50px;
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 14px;
  flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  z-index: 30;
}
.logo {
  display: flex; align-items: center; gap: 7px;
  font-size: 14px; font-weight: 900; color: var(--text); white-space: nowrap;
}
.logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--sb); }
.sep { width: 1px; height: 22px; background: var(--border2); flex-shrink: 0; }
.top-note { font-size: 11px; color: var(--muted); }

/* expo badges */
.expo-badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 20px; font-size: 9px; font-weight: 700;
  letter-spacing: .4px; white-space: nowrap; font-family: 'DM Mono', monospace;
}
.expo-tokyo25 { background: rgba(232,52,26,.1); color: #e8341a; border: 1px solid rgba(232,52,26,.25); }
.expo-kyushu26 { background: rgba(255,102,0,.1); color: var(--sb); border: 1px solid rgba(255,102,0,.3); }

.leg-row { display: flex; gap: 8px; align-items: center; margin-left: auto; flex-wrap: wrap; }
.leg { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--muted); white-space: nowrap; }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }

/* ── MAIN LAYOUT ── */
.main {
  flex: 1; overflow: hidden; display: flex;
  position: relative;
}

/* ── MATRIX SCROLL AREA ── */
.matrix-scroll {
  flex: 1; overflow: auto; position: relative;
  padding: 20px;
}
.matrix-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
.matrix-scroll::-webkit-scrollbar-track { background: var(--bg); }
.matrix-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* ── MATRIX GRID ── */
.matrix {
  display: grid;
  grid-template-columns: 160px repeat(var(--cols), 1fr);
  gap: 8px;
  min-width: max-content;
}

/* Y-axis (process layer) */
.y-label {
  display: flex; flex-direction: column;
  justify-content: flex-start; padding: 12px 10px;
  border-radius: 10px; position: sticky; left: 0;
  z-index: 10; background: var(--surface);
  box-shadow: 2px 0 8px rgba(0,0,0,0.06);
  border: 1.5px solid var(--border);
  min-height: 120px;
}
.y-step {
  font-size: 10px; font-weight: 900; letter-spacing: 1px;
  text-transform: uppercase; font-family: 'DM Mono', monospace;
  margin-bottom: 4px;
}
.y-desc {
  font-size: 10px; color: var(--muted); line-height: 1.5;
}
.y-num {
  font-size: 20px; font-weight: 900; opacity: 0.12;
  position: absolute; top: 8px; right: 10px;
  font-family: 'DM Mono', monospace;
}

/* X-axis (solution category) header */
.x-header {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
  text-align: center; position: sticky; top: 0; z-index: 20;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
.x-header-name {
  font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 3px;
}
.x-header-en {
  font-size: 9px; color: var(--muted); font-family: 'DM Mono', monospace;
}
/* corner cell */
.corner {
  background: var(--surface); border-radius: 10px;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  position: sticky; left: 0; top: 0; z-index: 25;
  padding: 8px;
}
.corner-text {
  font-size: 9px; color: var(--muted); text-align: center;
  font-family: 'DM Mono', monospace; line-height: 1.5; letter-spacing: .5px;
}

/* ── CELL ── */
.cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  min-height: 120px;
  display: flex; flex-direction: column; gap: 6px;
  position: relative;
  transition: border-color .15s;
}
.cell:hover { border-color: var(--border2); }
.cell.empty {
  background: var(--bg);
  border: 1px dashed var(--border);
}
.cell-accent {
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px; border-radius: 10px 10px 0 0;
  opacity: 0.6;
}

/* ── COMPANY CHIP ── */
.chip {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 5px 8px;
  cursor: pointer;
  transition: all .15s;
  position: relative;
}
.chip:hover {
  border-color: var(--sb);
  background: var(--sb-light);
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(255,102,0,0.15);
}
.chip-flag { font-size: 13px; flex-shrink: 0; }
.chip-name { font-size: 11px; font-weight: 700; color: var(--text); line-height: 1.2; flex: 1; }
.chip-dot {
  width: 6px; height: 6px; border-radius: 50%;
  flex-shrink: 0; margin-left: auto;
}
.chip-badges { display: flex; gap: 2px; flex-wrap: wrap; margin-top: 2px; }

/* ── TOOLTIP ── */
#tooltip {
  position: fixed; pointer-events: none; z-index: 200;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 12px; padding: 14px 16px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.15);
  max-width: 280px; display: none;
}
#tooltip.show { display: block; }
.tt-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.tt-flag { font-size: 20px; }
.tt-name { font-size: 14px; font-weight: 800; color: var(--text); }
.tt-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
.tt-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 8px; }
.tt-desc { font-size: 11px; color: var(--text2); line-height: 1.65; margin-bottom: 8px; }
.tt-kpis { display: flex; flex-direction: column; gap: 3px; border-top: 1px solid var(--border); padding-top: 7px; }
.tt-kpi { display: flex; justify-content: space-between; gap: 8px; font-size: 10px; }
.tt-kpi-l { color: var(--muted); }
.tt-kpi-v { font-weight: 700; color: var(--text); }
.tt-hint { font-size: 10px; color: var(--sb); font-weight: 600; margin-top: 8px; }
.tt-expo { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }

/* tags */
.tag { font-size: 9px; padding: 2px 6px; border-radius: 20px; font-family: 'DM Mono', monospace; font-weight: 700; white-space: nowrap; }
.tag-gtp { background: rgba(26,107,232,.1); color: #1a6be8; }
.tag-shuttle { background: rgba(26,158,74,.1); color: #1a9e4a; }
.tag-amr { background: rgba(176,122,0,.1); color: #b07a00; }
.tag-acr { background: rgba(255,102,0,.1); color: #ff6600; }
.tag-ai { background: rgba(155,31,212,.1); color: #9b1fd4; }
.tag-waas { background: rgba(196,52,134,.1); color: #c43486; }
.tag-integrator { background: rgba(90,104,128,.1); color: #5a6880; }
.tag-holding { background: rgba(232,52,26,.1); color: #e8341a; }
.tag-wms { background: rgba(10,126,184,.1); color: #0a7eb8; }
.tag-arm { background: rgba(155,31,212,.1); color: #9b1fd4; }
.tag-conv { background: rgba(90,104,128,.1); color: #5a6880; }

/* ── DETAIL PANEL ── */
#detail-panel {
  width: 360px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.16,1,.3,1);
  flex-shrink: 0;
  position: relative;
  box-shadow: -4px 0 20px rgba(0,0,0,0.06);
}
#detail-panel.open { transform: translateX(0); }

.dp-header {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
}
.dp-close {
  position: absolute; top: 14px; right: 14px;
  background: transparent; border: 1px solid var(--border2);
  color: var(--muted); width: 26px; height: 26px; border-radius: 50%;
  cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.dp-close:hover { border-color: #e8341a; color: #e8341a; }
.dp-flag { font-size: 24px; margin-bottom: 5px; }
.dp-name { font-size: 18px; font-weight: 900; color: var(--text); margin-bottom: 3px; }
.dp-sub { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 8px; }
.dp-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.dp-link {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
  text-decoration: none; border: 1px solid rgba(26,107,232,.3);
  color: #1a6be8; background: rgba(26,107,232,.06);
  transition: all .15s;
}
.dp-link:hover { background: rgba(26,107,232,.12); }

.dp-body {
  flex: 1; overflow-y: auto; padding: 14px 18px;
  display: flex; flex-direction: column; gap: 14px;
}
.dp-body::-webkit-scrollbar { width: 4px; }
.dp-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.dp-sec {
  font-size: 10px; font-family: 'DM Mono', monospace;
  letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
  margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.dp-sec::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.dp-desc { font-size: 12px; color: var(--text2); line-height: 1.7; }
.dp-kgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.dp-kbox { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; }
.dp-kl { font-size: 9px; color: var(--muted); margin-bottom: 2px; }
.dp-kv { font-size: 11px; font-weight: 700; color: var(--text); }
.dp-customers { display: flex; flex-direction: column; gap: 5px; }
.dp-customer {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; padding: 7px 10px;
}
.dp-cust-flag { font-size: 13px; }
.dp-cust-name { font-size: 11px; font-weight: 600; color: var(--text); flex: 1; }
.dp-cust-tag { font-size: 9px; padding: 2px 6px; border-radius: 12px; background: rgba(26,107,232,.08); color: #1a6be8; font-family: 'DM Mono', monospace; }
.dp-sol { display: flex; flex-direction: column; gap: 8px; }
.dp-sol-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
.dp-sol-name { font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.dp-sol-desc { font-size: 10px; color: var(--text2); line-height: 1.6; margin-bottom: 7px; }
.dp-sol-links { display: flex; gap: 6px; flex-wrap: wrap; }
.dp-sol-link {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 9px; border-radius: 6px; font-size: 10px; font-weight: 600;
  text-decoration: none; border: 1px solid; transition: all .15s;
}
.dp-sol-link.video { border-color: rgba(232,52,26,.35); color: #e8341a; background: rgba(232,52,26,.06); }
.dp-sol-link.page { border-color: rgba(26,107,232,.35); color: #1a6be8; background: rgba(26,107,232,.06); }
.dp-sol-link:hover { opacity: 0.8; }
.dp-expo-card {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 12px;
}
.dp-expo-info { flex: 1; }
.dp-expo-name { font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.dp-expo-date { font-size: 10px; color: var(--muted); }
.dp-expo-link {
  font-size: 10px; color: #1a6be8; text-decoration: none;
  border: 1px solid rgba(26,107,232,.3); padding: 3px 8px; border-radius: 5px;
}
.dp-cells { display: flex; flex-direction: column; gap: 4px; }
.dp-cell-badge {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 9px; font-size: 10px; color: var(--text2);
}
.dp-cell-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>

// ═══════════ RENDER MATRIX ═══════════
function tagHTML(t){const i=TAGS[t];return i?`<span class="tag ${i.cls}">${i.label}</span>`:'';}

function renderMatrix(){
  // Compute max cols
  const maxCols=Math.max(...LAYERS.map(l=>l.cats.length));
  const mat=document.getElementById('matrix');
  mat.style.setProperty('--cols',maxCols);

  // Header row
  const corner=document.createElement('div');
  corner.className='corner';
  corner.innerHTML='<div class="corner-text">工程 ↓<br>種別 →</div>';
  mat.appendChild(corner);

  // We need to figure out which headers to show per row
  // Just build row by row
  mat.innerHTML='';

  LAYERS.forEach(layer=>{
    // Y label
    const yl=document.createElement('div');
    yl.className='y-label';
    yl.style.borderLeft=`4px solid ${layer.color}`;
    yl.innerHTML=`
      <div class="y-num">${LAYERS.indexOf(layer)+1}</div>
      <div class="y-step" style="color:${layer.color}">${layer.label}</div>
      <div class="y-desc">${layer.desc.replace(/\n/g,'<br>')}</div>
    `;
    mat.appendChild(yl);

    // Cells for each category
    layer.cats.forEach(cat=>{
      const cell=document.createElement('div');
      cell.className='cell';

      // accent bar
      const acc=document.createElement('div');
      acc.className='cell-accent';
      acc.style.background=layer.color;
      cell.appendChild(acc);

      // category header
      const hdr=document.createElement('div');
      hdr.style.cssText='font-size:10px;font-weight:700;color:'+layer.color+';font-family:"DM Mono",monospace;letter-spacing:.5px;line-height:1.4;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--border);';
      hdr.innerHTML=cat.name.replace(/\n/g,'<br>')+`<span style="font-size:8px;color:var(--muted);font-weight:400;display:block;margin-top:1px">${cat.en}</span>`;
      cell.appendChild(hdr);

      // Chips
      const unique=[];
      cat.cos.forEach(id=>{if(!unique.includes(id))unique.push(id);});
      unique.forEach(id=>{
        const co=CO[id];if(!co)return;
        const chip=document.createElement('div');
        chip.className='chip';
        const clr=CLUSTER_COLOR[co.cluster]||'#888';
        chip.innerHTML=`
          <span class="chip-flag">${co.flag}</span>
          <span class="chip-name">${co.label}</span>
          <span class="chip-dot" style="background:${clr}"></span>
        `;
        // Expo badges under chip
        const expos=NODE_EXPOS[id]||[];
        if(expos.length>0){
          const bd=document.createElement('div');
          bd.className='chip-badges';
          expos.forEach(code=>{
            const ex=EXPOS[code];if(!ex)return;
            const sp=document.createElement('span');
            sp.className=`expo-badge ${ex.cls}`;
            sp.style.cssText='font-size:7.5px;';
            sp.textContent=`${ex.emoji} ${ex.short}`;
            bd.appendChild(sp);
          });
          // rebuild chip with badges
          chip.appendChild(bd);
        }
        chip.addEventListener('mouseenter',e=>showTip(id,e));
        chip.addEventListener('mousemove',e=>posTip(e));
        chip.addEventListener('mouseleave',hideTip);
        chip.addEventListener('click',()=>openPanel(id,layer,cat));
        cell.appendChild(chip);
      });

      if(unique.length===0){cell.classList.add('empty');}
      mat.appendChild(cell);
    });

    // Fill empty cells to maintain grid
    const empty=maxCols-layer.cats.length;
    for(let i=0;i<empty;i++){
      const ec=document.createElement('div');
      ec.className='cell empty';
      mat.appendChild(ec);
    }
  });
}

// ═══════════ TOOLTIP ═══════════
const tip=document.getElementById('tooltip');
function showTip(id,e){
  const co=CO[id];if(!co)return;
  const expos=NODE_EXPOS[id]||[];
  const clr=CLUSTER_COLOR[co.cluster]||'#888';
  tip.innerHTML=`
    <div style="height:3px;border-radius:3px;background:${clr};margin-bottom:10px;"></div>
    <div class="tt-head">
      <span class="tt-flag">${co.flag}</span>
      <div>
        <div class="tt-name">${co.label}</div>
        <div class="tt-sub">${co.sub}</div>
      </div>
    </div>
    <div class="tt-tags">${co.tags.map(tagHTML).join('')}</div>
    <div class="tt-desc">${co.desc.slice(0,130)}${co.desc.length>130?'…':''}</div>
    ${co.kpis?.length?`<div class="tt-kpis">${co.kpis.slice(0,3).map(k=>`<div class="tt-kpi"><span class="tt-kpi-l">${k.l}</span><span class="tt-kpi-v">${k.v}</span></div>`).join('')}</div>`:''}
    ${expos.length?`<div class="tt-expo">${expos.map(code=>{const ex=EXPOS[code];return ex?`<span class="expo-badge ${ex.cls}">${ex.emoji} ${ex.label}</span>`:''}).join('')}</div>`:''}
    <div class="tt-hint">クリックで詳細を表示 →</div>
  `;
  posTip(e);
  tip.classList.add('show');
}
function posTip(e){
  const tw=tip.offsetWidth||280,th=tip.offsetHeight||200;
  let lx=e.clientX+14,ly=e.clientY-20;
  if(lx+tw>window.innerWidth-10)lx=e.clientX-tw-14;
  if(ly+th>window.innerHeight-10)ly=window.innerHeight-th-10;
  if(ly<10)ly=10;
  tip.style.left=lx+'px';tip.style.top=ly+'px';
}
function hideTip(){tip.classList.remove('show');}

// ═══════════ DETAIL PANEL ═══════════
function openPanel(id,layer,cat){
  const co=CO[id];if(!co)return;
  hideTip();
  const clr=CLUSTER_COLOR[co.cluster]||'#888';
  document.getElementById('dp-flag').textContent=co.flag;
  document.getElementById('dp-name').textContent=co.label;
  document.getElementById('dp-sub').textContent=co.sub;
  document.getElementById('dp-tags').innerHTML=co.tags.map(tagHTML).join('');
  const lnk=document.getElementById('dp-link');
  if(co.website){lnk.href=co.website;lnk.style.display='inline-flex';}
  else{lnk.style.display='none';}
  document.querySelector('.dp-header').style.borderLeft=`4px solid ${clr}`;

  const body=document.getElementById('dp-body');
  const expos=NODE_EXPOS[id]||[];
  let html='';

  // 今開いたセルの情報
  html+=`<div>
    <div class="dp-sec">表示中のセル</div>
    <div class="dp-cell-badge">
      <span class="dp-cell-dot" style="background:${layer.color}"></span>
      <span style="font-size:11px;font-weight:700;color:${layer.color}">${layer.label}</span>
      <span style="color:var(--muted)">›</span>
      <span style="font-size:11px">${cat.name.replace(/\n/g,' ')}</span>
    </div>
  </div>`;

  html+=`<div><div class="dp-sec">概要</div><div class="dp-desc">${co.desc}</div></div>`;

  if(co.kpis?.length){
    html+=`<div><div class="dp-sec">Key Metrics</div><div class="dp-kgrid">${co.kpis.map(k=>`<div class="dp-kbox"><div class="dp-kl">${k.l}</div><div class="dp-kv">${k.v}</div></div>`).join('')}</div></div>`;
  }
  if(co.customers?.length){
    html+=`<div><div class="dp-sec">主要顧客</div><div class="dp-customers">${co.customers.map(c=>`<div class="dp-customer"><span class="dp-cust-flag">${c.flag}</span><span class="dp-cust-name">${c.name}</span><span class="dp-cust-tag">${c.tag}</span></div>`).join('')}</div></div>`;
  }
  if(co.solutions?.length){
    html+=`<div><div class="dp-sec">主要ソリューション</div><div class="dp-sol">${co.solutions.map(s=>`
      <div class="dp-sol-card">
        <div class="dp-sol-name">⚙️ ${s.name}</div>
        <div class="dp-sol-desc">${s.desc}</div>
        <div class="dp-sol-links">
          ${s.videoUrl?`<a href="${s.videoUrl}" target="_blank" class="dp-sol-link video">🎬 動画</a>`:''}
          ${s.linkUrl?`<a href="${s.linkUrl}" target="_blank" class="dp-sol-link page">📄 ${s.linkLabel||'詳細'}</a>`:''}
        </div>
      </div>`).join('')}</div></div>`;
  }

  // 他に登場する工程
  const otherCells=[];
  LAYERS.forEach(l=>{
    l.cats.forEach(c=>{
      if(c.cos.includes(id)&&!(l.id===layer.id&&c.name===cat.name)){
        otherCells.push({layer:l,cat:c});
      }
    });
  });
  if(otherCells.length>0){
    html+=`<div><div class="dp-sec">他の工程での登場</div><div class="dp-cells">${otherCells.map(({layer:l,cat:c})=>`<div class="dp-cell-badge"><span class="dp-cell-dot" style="background:${l.color}"></span><span style="font-size:10px;font-weight:700;color:${l.color}">${l.label}</span><span style="color:var(--muted)">›</span><span style="font-size:10px">${c.name.replace(/\n/g,' ')}</span></div>`).join('')}</div></div>`;
  }

  if(expos.length>0){
    html+=`<div><div class="dp-sec">展示会出展情報</div>${expos.map(code=>{const ex=EXPOS[code];return ex?`<div class="dp-expo-card"><div><span class="expo-badge ${ex.cls}" style="font-size:10px;padding:3px 9px;">${ex.emoji} ${ex.short}</span></div><div class="dp-expo-info"><div class="dp-expo-name">${ex.label}</div><div class="dp-expo-date">📅 ${ex.date} ／ 📍 ${ex.venue}</div></div><a href="${ex.url}" target="_blank" class="dp-expo-link">🔗 展示会</a></div>`:''}).join('')}</div>`;
  }

  body.innerHTML=html;
  document.getElementById('detail-panel').classList.add('open');
}

document.getElementById('dp-close').addEventListener('click',()=>{
  document.getElementById('detail-panel').classList.remove('open');
});

// Close on outside click
document.getElementById('matrix-scroll').addEventListener('click',e=>{
  if(!e.target.closest('.chip'))
    document.getElementById('detail-panel').classList.remove('open');
});

// ═══════════ INIT ═══════════
renderMatrix();
</script>
</body>
</html>
